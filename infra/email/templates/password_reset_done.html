<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Your password was changed</title></head>
<body style="margin:0;padding:0;background:#f4f5f7;font-family:Arial,Helvetica,sans-serif;color:#1f2933;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="padding:24px 0;">
    <tr><td align="center">
      <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:8px;padding:32px;">
        <tr><td>
          <h1 style="margin:0 0 16px;font-size:20px;">Your password was changed</h1>
          <p style="margin:0 0 16px;font-size:14px;line-height:22px;">
            Hi{{if .Name}} {{.Name}}{{end}}, this is a confirmation that your password was just changed. All other sessions have been signed out.
          </p>
          <p style="margin:24px 0 0;font-size:12px;color:#7b8794;">If you did not make this change, contact your administrator immediately.</p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
