<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>{{.Subject}}</title></head>
<body style="margin:0;padding:0;background:#f4f5f7;font-family:Arial,Helvetica,sans-serif;color:#1f2933;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="padding:24px 0;">
    <tr><td align="center">
      <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:8px;padding:32px;">
        <tr><td>
          <h1 style="margin:0 0 16px;font-size:18px;">{{.Subject}}</h1>
          {{if .Link}}
          <p style="margin:0 0 24px;">
            <a href="{{.Link}}" style="display:inline-block;background:#2563eb;color:#ffffff;text-decoration:none;padding:12px 20px;border-radius:6px;font-size:14px;">Open in app</a>
          </p>
          {{end}}
          <p style="margin:0;font-size:12px;color:#7b8794;">You are receiving this because of your notification preferences.</p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
