services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # S3-compatible object store for local attachment testing (STORAGE_PROVIDER=s3).
  # minio-init creates the bucket on first boot.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/chat-attachments;
      "

  app:
    build: .
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RUN_ROLE: all
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DATABASE: chat
      REDIS_ADDR: redis:6379
      HTTP_PORT: 8080
      # Attachments on MinIO (S3-compatible). For real AWS, drop S3_ENDPOINT /
      # S3_FORCE_PATH_STYLE and the static keys and rely on an IAM role.
      STORAGE_PROVIDER: s3
      S3_BUCKET: chat-attachments
      S3_REGION: us-east-1
      S3_ENDPOINT: http://minio:9000
      S3_FORCE_PATH_STYLE: "true"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_PRESIGN_EXPIRY: 300s
    ports:
      - "8080:8080"

volumes:
  mongo_data:
  redis_data:
  minio_data:
