components:
    responses:
        Error400:
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
            description: Validation error (validation_error).
        Error401:
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
            description: Missing/invalid access token (unauthorized).
        Error403:
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
            description: Insufficient permission (forbidden).
        Error404:
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
            description: Resource not found (not_found).
        Error409:
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
            description: Conflict (conflict).
        Error429:
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
            description: Rate limited (rate_limited).
        Error500:
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
            description: Internal error (internal_error).
    schemas:
        AcceptInviteRequest:
            properties:
                name:
                    type: string
                password:
                    type: string
                token:
                    type: string
            required:
                - token
                - name
                - password
            type: object
        AddDealTagRequest:
            properties:
                tag_id:
                    type: string
            required:
                - tag_id
            type: object
        AddItemRequest:
            properties:
                product_id:
                    type: string
                quantity:
                    type: integer
            required:
                - product_id
                - quantity
            type: object
        AddStageRequest:
            properties:
                color:
                    type: string
                is_lost:
                    type: boolean
                is_won:
                    type: boolean
                name:
                    type: string
                order:
                    type: integer
            required:
                - name
            type: object
        AgentStat:
            properties:
                agent_id:
                    type: string
                avatar_url:
                    description: 'Read-only, derived: the agent''s short-lived signed avatar URL (no Authorization). Empty when the agent has no ready avatar.'
                    type: string
                avg_resolution_seconds:
                    type: number
                conversations:
                    type: integer
                name:
                    description: 'Read-only, derived: the agent''s display name, resolved in batch so the report renders the agent instead of a raw id. Empty when unresolved.'
                    type: string
            type: object
        ApplyTagsRequest:
            properties:
                add:
                    description: Tag IDs (never names). On write you may send a tag ID or a tag name; the server resolves names to canonical IDs, so values are always stored and returned as IDs.
                    items:
                        type: string
                    type: array
                remove:
                    description: Tag IDs (never names). On write you may send a tag ID or a tag name; the server resolves names to canonical IDs, so values are always stored and returned as IDs.
                    items:
                        type: string
                    type: array
            type: object
        AskRequest:
            properties:
                conversation_id:
                    type: string
                history:
                    description: The prior agent↔assistant turns (oldest first), so the assistant keeps the thread. Ephemeral and front-managed; the backend does not persist it and caps it to the last few turns.
                    items:
                        properties:
                            role:
                                enum:
                                    - agent
                                    - assistant
                                type: string
                            text:
                                type: string
                        required:
                            - role
                            - text
                        type: object
                    type: array
                instruction:
                    description: The agent's question in natural language (e.g. "como está a fatura desse cliente?").
                    type: string
            required:
                - conversation_id
            type: object
        AssignRequest:
            properties:
                agent_id:
                    type: string
            type: object
        AssignableAgent:
            properties:
                avatar_url:
                    description: 'Read-only, derived: the agent''s short-lived signed avatar URL (loadable in <img src>, no Authorization). Empty when the agent has no ready avatar.'
                    type: string
                current_load:
                    type: integer
                id:
                    type: string
                max_concurrent_chats:
                    type: integer
                name:
                    type: string
                status:
                    description: 'Presence status: online | available | busy | away | paused | lunch | training | offline ("offline" when the agent has no live presence). The list ALWAYS includes offline agents of the sector — they are selectable for manual assign/transfer (the operator sees the status and chooses). Render a presence badge; do NOT hide or disable offline agents.'
                    type: string
            type: object
        Attachment:
            properties:
                content_type:
                    type: string
                filename:
                    type: string
                id:
                    type: string
                size:
                    type: integer
                url:
                    description: Signed, time-boxed channel-media URL (GET /v1/channel-media/{token}) loadable DIRECTLY in <img>/<audio>/<video> src — no Authorization header, no per-image access check. It is a bearer URL (the token grants access to that one object until it expires) and is regenerated on each read; for an access-checked download use GET /v1/attachments/{id}/download.
                    type: string
            type: object
        AttachmentRecord:
            properties:
                content_type:
                    type: string
                conversation_id:
                    type: string
                created_at:
                    format: date-time
                    type: string
                download_url:
                    description: Signed, JWT-less channel-media URL (GET /v1/channel-media/{token}) renderable directly in <img>/<audio>/<video> src. Time-boxed bearer token, regenerated on each read.
                    type: string
                filename:
                    type: string
                id:
                    type: string
                message_id:
                    type: string
                size:
                    type: integer
                status:
                    type: string
                storage_provider:
                    type: string
            type: object
        AuditLog:
            properties:
                action:
                    type: string
                actor_id:
                    type: string
                actor_name:
                    description: 'Read-only, derived: the actor''s display name, resolved in batch so the log renders the name instead of a raw id; empty for non-user actors (system/platform) or when unresolved.'
                    type: string
                actor_type:
                    type: string
                created_at:
                    format: date-time
                    type: string
                data:
                    additionalProperties: true
                    type: object
                id:
                    type: string
                ip:
                    type: string
                resource_id:
                    type: string
                resource_type:
                    type: string
                user_agent:
                    type: string
            type: object
        AutomationRule:
            properties:
                actions:
                    items:
                        $ref: '#/components/schemas/AutomationRuleAction'
                    type: array
                conditions:
                    items:
                        $ref: '#/components/schemas/AutomationRuleCondition'
                    type: array
                created_at:
                    format: date-time
                    type: string
                description:
                    type: string
                enabled:
                    type: boolean
                event:
                    enum:
                        - conversation_created
                        - conversation_updated
                        - conversation_resolved
                        - conversation_opened
                        - conversation_closed
                        - message_created
                        - interactive_reply_received
                    type: string
                health:
                    $ref: '#/components/schemas/AutomationRuleHealth'
                id:
                    type: string
                name:
                    type: string
                priority:
                    description: Firing order among rules on the same event (ascending; lower first). Ties break by created_at then id.
                    type: integer
                tenant_id:
                    type: string
                updated_at:
                    format: date-time
                    type: string
            type: object
        AutomationRuleAction:
            properties:
                agent_id:
                    description: 'assign_agent: the agent (user) id.'
                    type: string
                attachment_id:
                    description: 'send_attachment: an uploaded, ready attachment id (same tenant).'
                    type: string
                pipeline_id:
                    description: 'move_deal_stage: the target pipeline id (the stage must belong to it).'
                    type: string
                priority:
                    description: 'change_priority: one of low|normal|high|urgent.'
                    type: string
                sector_id:
                    description: 'assign_team: the sector (team) id.'
                    type: string
                stage_id:
                    description: 'move_deal_stage: the target stage id. Deals linked to the conversation (in this pipeline) move there; none is created, and a deal already in the stage is left untouched.'
                    type: string
                tag_id:
                    description: 'add_tag/remove_tag: the tag id.'
                    type: string
                text:
                    description: 'send_message: the message text (sent as System Automation).'
                    type: string
                type:
                    description: Action kind. Each reads only its own param (below).
                    enum:
                        - send_webhook
                        - send_message
                        - send_attachment
                        - assign_agent
                        - assign_team
                        - remove_assigned_agent
                        - remove_assigned_team
                        - add_tag
                        - remove_tag
                        - change_priority
                        - resolve_conversation
                        - open_conversation
                        - mark_pending
                        - move_deal_stage
                    type: string
                webhook_id:
                    description: 'send_webhook: id of a registered webhook (/v1/webhooks).'
                    type: string
            required:
                - type
            type: object
        AutomationRuleCondition:
            properties:
                field:
                    enum:
                        - status
                        - channel
                        - assigned_agent_id
                        - sector_id
                        - queue_id
                        - priority
                        - tags
                        - contact_phone
                        - message_content
                        - interactive_reply_id
                    type: string
                operator:
                    description: 'Allowed operators depend on the field: scalar fields → equal_to/not_equal_to; tags & message_content → contains/does_not_contain; contact_phone → equal_to/contains; interactive_reply_id → equal_to/not_equal_to (one id) or contains/does_not_contain (membership in a comma-separated id list).'
                    enum:
                        - equal_to
                        - not_equal_to
                        - contains
                        - does_not_contain
                    type: string
                value:
                    description: Comparison value; for tags it is a single tag id; for message_content the substring to match (case-insensitive) against the triggering message text; for interactive_reply_id the chosen button/list id (e.g. "intent_500mb"), or a comma-separated id list with contains/does_not_contain.
                    type: string
            required:
                - field
                - operator
                - value
            type: object
        AutomationRuleHealth:
            properties:
                missing_refs:
                    items:
                        properties:
                            action_index:
                                type: integer
                            id:
                                type: string
                            kind:
                                enum:
                                    - agent
                                    - sector
                                    - tag
                                    - attachment
                                    - webhook
                                type: string
                        type: object
                    type: array
                ok:
                    description: False when an action references a deleted agent/tag/sector/webhook (the action is skipped at runtime — skipped_missing_ref).
                    type: boolean
            type: object
        AvatarUploadTarget:
            properties:
                owner_id:
                    type: string
                owner_type:
                    enum:
                        - contacts
                        - users
                    type: string
            required:
                - owner_type
                - owner_id
            type: object
        Bucket:
            properties:
                count:
                    type: integer
                key:
                    type: string
                label:
                    description: 'Read-only, derived: the resolved display name when the key is a raw id (sector, close reason), resolved in batch so the report renders the name instead of the id; empty when the key is already human-readable (status, channel, score) or unresolved.'
                    type: string
            type: object
        BusinessHours:
            description: A channel's weekly business hours. Lives on the ChannelConnection (each connection of the same type can have its own). An empty object means the channel is always open.
            properties:
                timezone:
                    description: IANA timezone the schedule is evaluated in (e.g. "America/Sao_Paulo"). Defaults to UTC. "Open now?" is resolved in this timezone, not the server's.
                    type: string
                weekly:
                    description: Per-weekday open intervals. An empty/absent document means always open (24/7).
                    items:
                        $ref: '#/components/schemas/BusinessHoursDay'
                    type: array
            type: object
        BusinessHoursDay:
            properties:
                day:
                    description: Weekday, 0=Sunday..6=Saturday. A day absent (or with no intervals) is closed.
                    type: integer
                intervals:
                    description: Open intervals for the day, e.g. a morning and an afternoon window split by lunch. Must not overlap.
                    items:
                        $ref: '#/components/schemas/BusinessHoursInterval'
                    type: array
            required:
                - day
            type: object
        BusinessHoursInterval:
            properties:
                end:
                    description: 'Local closing time "HH:MM" (exclusive). Must be after start — intervals never cross midnight. For an overnight shift (e.g. 22:00–05:30) model it as two days: end the first day at "24:00" and start the next day at "00:00" for a contiguous span.'
                    type: string
                start:
                    description: Local opening time "HH:MM" (inclusive).
                    type: string
            required:
                - start
                - end
            type: object
        BusinessStatus:
            properties:
                channel_id:
                    type: string
                holiday_name:
                    type: string
                local_time:
                    format: date-time
                    type: string
                open:
                    type: boolean
                reason:
                    enum:
                        - open
                        - outside_hours
                        - holiday
                        - unconfigured
                    type: string
                timezone:
                    type: string
                today_intervals:
                    items:
                        type: string
                    type: array
            type: object
        CRMSettings:
            properties:
                products_enabled:
                    description: The products module is enabled for the tenant (default false).
                    type: boolean
                tasks_enabled:
                    description: The tasks module is enabled for the tenant (default false).
                    type: boolean
                tenant_id:
                    type: string
                timeline_enabled:
                    description: The timeline module is enabled for the tenant (default true).
                    type: boolean
                updated_at:
                    description: Last change; zero value when the tenant has never configured its CRM (defaults returned).
                    format: date-time
                    type: string
            type: object
        CSATResponse:
            properties:
                agent_avatar_url:
                    description: 'Read-only, derived: the agent''s short-lived signed avatar URL, resolved in batch; empty when no agent or unresolved.'
                    type: string
                agent_id:
                    type: string
                agent_name:
                    description: 'Read-only, derived: the agent''s display name, resolved in batch so the report renders the name instead of a raw id; empty when no agent or unresolved.'
                    type: string
                comment:
                    type: string
                contact_id:
                    type: string
                contact_name:
                    description: 'Read-only, derived: the contact''s display name, resolved in batch so the report renders the name instead of a raw id; empty when unresolved.'
                    type: string
                conversation_id:
                    type: string
                created_at:
                    format: date-time
                    type: string
                id:
                    type: string
                responded_at:
                    format: date-time
                    type: string
                score:
                    type: integer
                sent_at:
                    format: date-time
                    type: string
                status:
                    type: string
                survey_id:
                    type: string
                survey_name:
                    description: 'Read-only, derived: the survey''s name, resolved in batch so the report renders the name instead of a raw id; empty when unresolved.'
                    type: string
            type: object
        CannedResponse:
            properties:
                body:
                    type: string
                created_at:
                    format: date-time
                    type: string
                enabled:
                    type: boolean
                global:
                    type: boolean
                id:
                    type: string
                sector_ids:
                    items:
                        type: string
                    type: array
                shortcut:
                    type: string
                tenant_id:
                    type: string
                title:
                    type: string
                updated_at:
                    format: date-time
                    type: string
            type: object
        Chamado:
            properties:
                msg:
                    type: string
                protocolo:
                    type: string
            type: object
        ChamadoRequest:
            properties:
                id_cliente:
                    type: string
                isp_config_id:
                    type: string
                message:
                    type: string
                subject:
                    type: string
            required:
                - id_cliente
            type: object
        ChangePasswordRequest:
            properties:
                current_password:
                    type: string
                new_password:
                    type: string
            required:
                - current_password
                - new_password
            type: object
        Channel:
            properties:
                auth_type:
                    type: string
                base_url:
                    description: 'Outbound URL: when set, the channel auto-manages a webhook subscription (signed with the channel secret) that delivers conversation + message events to it. outbound_url is an accepted alias on write.'
                    type: string
                business_hours:
                    $ref: '#/components/schemas/BusinessHours'
                created_at:
                    format: date-time
                    type: string
                enabled:
                    type: boolean
                has_inbound_token:
                    type: boolean
                has_secret:
                    type: boolean
                id:
                    type: string
                name:
                    type: string
                out_of_hours_message:
                    description: Auto-sent to the customer ONCE when a NEW inbound conversation opens while the channel is OUTSIDE business hours (the conversation still enters normally — this is only a notice). Empty = disabled.
                    type: string
                status:
                    type: string
                tenant_id:
                    type: string
                type:
                    type: string
                updated_at:
                    format: date-time
                    type: string
                uses_protocol:
                    description: When true, inbound opens a NEW conversation with a NEW protocol number for this channel; a closed last conversation is NOT reopened. When false (default), a closed last conversation is reopened and no protocol is assigned.
                    type: boolean
                whatsapp_templates:
                    items:
                        $ref: '#/components/schemas/WhatsAppTemplate'
                    type: array
            type: object
        ChannelCreated:
            properties:
                auth_type:
                    type: string
                base_url:
                    type: string
                business_hours:
                    $ref: '#/components/schemas/BusinessHours'
                created_at:
                    format: date-time
                    type: string
                enabled:
                    type: boolean
                has_inbound_token:
                    type: boolean
                has_secret:
                    type: boolean
                id:
                    type: string
                inbound_token:
                    type: string
                name:
                    type: string
                out_of_hours_message:
                    type: string
                outbound_secret:
                    type: string
                status:
                    type: string
                tenant_id:
                    type: string
                type:
                    type: string
                updated_at:
                    format: date-time
                    type: string
                uses_protocol:
                    type: boolean
                whatsapp_templates:
                    items:
                        $ref: '#/components/schemas/WhatsAppTemplate'
                    type: array
            type: object
        ChannelOutboundMessage:
            properties:
                contact:
                    properties:
                        external_id:
                            type: string
                        id:
                            type: string
                        name:
                            type: string
                        phone:
                            type: string
                    type: object
                conversation_id:
                    type: string
                delivery_id:
                    type: string
                message:
                    properties:
                        attachments:
                            items:
                                properties:
                                    content_type:
                                        type: string
                                    data_url:
                                        type: string
                                    file_type:
                                        enum:
                                            - image
                                            - audio
                                            - video
                                            - file
                                        type: string
                                    filename:
                                        type: string
                                    size:
                                        type: integer
                                    url:
                                        type: string
                                type: object
                            type: array
                        content:
                            type: string
                        file_type:
                            type: string
                        message_type:
                            type: string
                        private:
                            type: boolean
                        text:
                            type: string
                    type: object
                metadata:
                    additionalProperties: true
                    type: object
                timestamp:
                    type: integer
            type: object
        ClassifyRequest:
            properties:
                categories:
                    items:
                        type: string
                    type: array
                conversation_id:
                    type: string
            required:
                - conversation_id
                - categories
            type: object
        Cliente:
            properties:
                contrato_status_display:
                    type: string
                cpfcnpj:
                    type: string
                faturas:
                    items:
                        $ref: '#/components/schemas/Fatura'
                    type: array
                nome:
                    type: string
                valor_check_out:
                    type: number
            type: object
        ClienteFound:
            properties:
                cliente:
                    $ref: '#/components/schemas/Cliente'
                needs_selection:
                    const: false
                    type: boolean
            required:
                - needs_selection
                - cliente
            type: object
        ClienteNeedsSelection:
            properties:
                needs_selection:
                    const: true
                    type: boolean
                options:
                    items:
                        $ref: '#/components/schemas/ContratoOption'
                    type: array
            required:
                - needs_selection
                - options
            type: object
        ClienteRequest:
            properties:
                cpfcnpj:
                    type: string
                email:
                    type: string
                id_cliente:
                    description: Target a specific contract after a needs_input selection.
                    type: string
                isp_config_id:
                    description: ISP profile id to use; omit to use the tenant default. If there is no default and 2+ profiles, the response is a NeedsISPSelection prompt.
                    type: string
                phone:
                    type: string
            type: object
        ClienteResult:
            description: When needs_selection is true, render a contract selector from options[].id_cliente; otherwise use cliente.
            oneOf:
                - $ref: '#/components/schemas/ClienteFound'
                - $ref: '#/components/schemas/ClienteNeedsSelection'
        CloseReason:
            properties:
                created_at:
                    format: date-time
                    type: string
                enabled:
                    type: boolean
                id:
                    type: string
                name:
                    type: string
                requires_note:
                    type: boolean
                tenant_id:
                    type: string
                updated_at:
                    format: date-time
                    type: string
            type: object
        CloseRequest:
            properties:
                close_reason_id:
                    type: string
                note:
                    type: string
            type: object
        ConfirmAttachmentRequest:
            properties:
                attachment_id:
                    type: string
                message_id:
                    type: string
            required:
                - attachment_id
            type: object
        Contact:
            properties:
                avatar_attachment_id:
                    description: Attachment id of the contact's avatar (write it via PATCH).
                    type: string
                avatar_url:
                    description: 'Read-only, derived: a short-lived signed URL loadable directly in <img src> (no Authorization). Present only when the avatar exists and is ready. Do not cache long-term.'
                    type: string
                created_at:
                    format: date-time
                    type: string
                custom_attributes:
                    additionalProperties: true
                    description: Tenant-defined custom attribute values (key→value), validated against the custom_attribute_definitions for this entity (contact/conversation). On PATCH it replaces the whole map; omit a key to remove it.
                    type: object
                document:
                    type: string
                email:
                    type: string
                external_ids:
                    items:
                        $ref: '#/components/schemas/ContactExternalID'
                    type: array
                id:
                    type: string
                name:
                    type: string
                notes:
                    type: string
                phones:
                    items:
                        type: string
                    type: array
                tags:
                    description: Tag IDs (never names). On write you may send a tag ID or a tag name; the server resolves names to canonical IDs, so values are always stored and returned as IDs.
                    items:
                        type: string
                    type: array
                tenant_id:
                    type: string
                updated_at:
                    format: date-time
                    type: string
            type: object
        ContactExternalID:
            properties:
                channel:
                    enum:
                        - whatsapp
                        - telegram
                        - instagram
                        - messenger
                        - webchat
                        - sms
                        - email
                        - api
                        - crm
                        - custom
                    type: string
                external_id:
                    type: string
            type: object
        ContactHit:
            properties:
                document:
                    type: string
                id:
                    type: string
                name:
                    type: string
                phone:
                    type: string
            type: object
        ContactIdentityRequest:
            properties:
                channel:
                    description: Identity channel slug (e.g. "whatsapp"). Optional — defaults to the {channel} path type.
                    type: string
                contact_id:
                    description: The chat's contact id (as delivered in the message_created webhook contact.id). The identity is added to THIS contact.
                    type: string
                external_id:
                    description: The verified external identifier to persist, e.g. a WhatsApp JID "554499088478@s.whatsapp.net".
                    type: string
                inbound_token:
                    description: Channel integration token (alternative to the X-Inbound-Token header).
                    type: string
            required:
                - contact_id
                - external_id
            type: object
        ContratoOption:
            properties:
                endereco:
                    type: string
                id_cliente:
                    type: string
                label:
                    type: string
                status:
                    type: string
            required:
                - id_cliente
                - label
            type: object
        Conversation:
            properties:
                agent_avatar_url:
                    description: 'Read-only, derived: the assignee''s short-lived signed avatar URL (no Authorization), resolved in batch. Empty when unassigned or no ready avatar.'
                    type: string
                agent_name:
                    description: 'Read-only, derived: the assignee''s display name, resolved in batch. Empty when the conversation is unassigned.'
                    type: string
                assigned_to:
                    type: string
                channel:
                    type: string
                channel_id:
                    description: Id of the specific ChannelConnection this conversation belongs to (e.g. which of several same-type WhatsApp numbers). Empty only for conversations created without one.
                    type: string
                closed_at:
                    format: date-time
                    type: string
                contact_avatar_url:
                    description: 'Read-only, derived: the conversation contact''s short-lived signed avatar URL (loadable in <img src>, no Authorization), resolved in batch for the inbox. Empty when the contact has no ready avatar.'
                    type: string
                contact_id:
                    type: string
                contact_name:
                    description: 'Read-only, derived: the conversation contact''s display name, resolved in batch so the inbox renders the row without a per-contact fetch. Empty when the contact is absent.'
                    type: string
                created_at:
                    format: date-time
                    type: string
                custom_attributes:
                    additionalProperties: true
