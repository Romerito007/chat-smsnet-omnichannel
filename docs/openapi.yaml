info:
    description: 'Multi-tenant omnichannel chat backend. All endpoints are under /v1. Errors use the standard envelope { error: { code, message, details?, request_id? } }; lists use keyset (cursor) pagination { data, page: { next_cursor?, has_more } }; protected endpoints require a Bearer JWT access token (the tenant is derived from the token, never a header).'
    title: chat-smsnet-omnichannel API
    version: 1.0.0
openapi: 3.1.0
paths:
    /v1/agents:
        get:
            operationId: getAgents
            parameters:
                - description: Only agents assignable to this sector (matches what assign accepts).
                  in: query
                  name: sector_id
                  required: false
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                properties:
                                    data:
                                        items:
                                            $ref: '#/components/schemas/AssignableAgent'
                                        type: array
                                type: object
                    description: Assignable agents
                "400":
                    $ref: '#/components/responses/Error400'
                "401":
                    $ref: '#/components/responses/Error401'
                "403":
                    $ref: '#/components/responses/Error403'
                "429":
                    $ref: '#/components/responses/Error429'
                "500":
                    $ref: '#/components/responses/Error500'
            summary: List assignable agents (id, name, presence) for the assignment selector — conversation.assign
            tags:
                - presence
    /v1/agents/presence:
        get:
            operationId: getAgentsPresence
            parameters:
                - description: Scope to the agents of this sector (server-side); omit for the whole team.
                  in: query
                  name: sector_id
                  required: false
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: '#/components/schemas/Presence'
                                type: array
                    description: Presence list
                "400":
                    $ref: '#/components/responses/Error400'
                "401":
                    $ref: '#/components/responses/Error401'
                "403":
                    $ref: '#/components/responses/Error403'
                "429":
                    $ref: '#/components/responses/Error429'
                "500":
                    $ref: '#/components/responses/Error500'
            summary: List agent presence
            tags:
                - presence
    /v1/agents/presence/status:
        post:
            operationId: postAgentsPresenceStatus
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/SetStatusRequest'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Presence'
                    description: Presence
                "400":
                    $ref: '#/components/responses/Error400'
                "401":
                    $ref: '#/components/responses/Error401'
                "403":
                    $ref: '#/components/responses/Error403'
                "429":
                    $ref: '#/components/responses/Error429'
                "500":
                    $ref: '#/components/responses/Error500'
            summary: Set own (or an agent's) status
            tags:
                - presence
    /v1/attachments/{id}:
        get:
            operationId: getAttachmentsById
            parameters:
                - description: attachment id
                  in: path
                  name: id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AttachmentRecord'
                    description: Attachment
                "400":
                    $ref: '#/components/responses/Error400'
                "401":
                    $ref: '#/components/responses/Error401'
                "403":
                    $ref: '#/components/responses/Error403'
                "429":
                    $ref: '#/components/responses/Error429'
                "500":
                    $ref: '#/components/responses/Error500'
            summary: Get attachment metadata
            tags:
                - attachments
    /v1/attachments/{id}/download:
        get:
            operationId: getAttachmentsByIdDownload
            parameters:
                - description: attachment id
                  in: path
                  name: id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: The file
                "302":
                    description: Redirect to storage
                "400":
                    $ref: '#/components/responses/Error400'
                "401":
                    $ref: '#/components/responses/Error401'
                "403":
                    $ref: '#/components/responses/Error403'
                "429":
                    $ref: '#/components/responses/Error429'
                "500":
                    $ref: '#/components/responses/Error500'
            summary: Download (or redirect to) an attachment
            tags:
                - attachments
    /v1/attachments/blobs/{token}:
        put:
            operationId: putAttachmentsBlobsByToken
            parameters:
                - description: signed upload token
                  in: path
                  name: token
                  required: true
                  schema:
                    type: string
            requestBody:
                content:
                    application/octet-stream:
                        schema:
                            format: binary
                            type: string
                required: true
            responses:
                "200":
                    description: Stored
                "400":
                    $ref: '#/components/responses/Error400'
                "429":
                    $ref: '#/components/responses/Error429'
                "500":
                    $ref: '#/components/responses/Error500'
            security: []
            summary: Upload bytes to the local signed sink (local provider)
            tags:
                - attachments
    /v1/attachments/confirm:
        post:
            operationId: postAttachmentsConfirm
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ConfirmAttachmentRequest'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AttachmentRecord'
                    description: Attachment
                "400":
                    $ref: '#/components/responses/Error400'
                "401":
                    $ref: '#/components/responses/Error401'
                "403":
                    $ref: '#/components/responses/Error403'
                "429":
                    $ref: '#/components/responses/Error429'
                "500":
                    $ref: '#/components/responses/Error500'
            summary: Confirm an uploaded attachment
            tags:
                - attachments
    /v1/attachments/upload-url:
        post:
            operationId: postAttachmentsUploadUrl
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CreateUploadURLRequest'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UploadURLResponse'
                    description: Upload target
                "400":
                    $ref: '#/components/responses/Error400'
                "401":
                    $ref: '#/components/responses/Error401'
                "403":
                    $ref: '#/components/responses/Error403'
                "429":
                    $ref: '#/components/responses/Error429'
                "500":
                    $ref: '#/components/responses/Error500'
            summary: Create a signed upload URL
            tags:
                - attachments
    /v1/audit:
        get:
            operationId: getAudit
            parameters:
                - description: Page size (max 100).
                  in: query
                  name: limit
                  required: false
                  schema:
                    maximum: 100
                    minimum: 1
                    type: integer
                - description: Opaque keyset cursor from a previous page's next_cursor.
                  in: query
                  name: cursor
                  required: false
                  schema:
                    type: string
                - description: Filter by action
                  in: query
                  name: action
                  required: false
                  schema:
                    type: string
                - description: Filter by actor
                  in: query
                  name: actor_id
                  required: false
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                properties:
                                    data:
                                        items:
                                            $ref: '#/components/schemas/AuditLog'
                                        type: array
                                    page:
                                        $ref: '#/components/schemas/PageInfo'
                                type: object
                    description: Audit page
                "400":
                    $ref: '#/components/responses/Error400'
                "401":
                    $ref: '#/components/responses/Error401'
                "403":
                    $ref: '#/components/responses/Error403'
                "429":
                    $ref: '#/components/responses/Error429'
                "500":
                    $ref: '#/components/responses/Error500'
            summary: List audit log entries
            tags:
                - audit
    /v1/auth/accept-invite:
        post:
            operationId: postAuthAcceptInvite
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/AcceptInviteRequest'
                required: true
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MessageAck'
                    description: OK
                "400":
                    $ref: '#/components/responses/Error400'
                "429":
                    $ref: '#/components/responses/Error429'
                "500":
                    $ref: '#/components/responses/Error500'
            security: []
            summary: Accept a teammate invitation
            tags:
                - auth
    /v1/auth/forgot-password:
        post:
            operationId: postAuthForgotPassword
            requestBody:
                content:
