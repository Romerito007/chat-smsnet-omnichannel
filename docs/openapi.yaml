components:
    responses:
        Error400:
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
            description: Validation error (validation_error).
        Error401:
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
            description: Missing/invalid access token (unauthorized).
        Error403:
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
            description: Insufficient permission (forbidden).
        Error404:
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
            description: Resource not found (not_found).
        Error409:
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
            description: Conflict (conflict).
        Error429:
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
            description: Rate limited (rate_limited).
        Error500:
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
            description: Internal error (internal_error).
    schemas:
        AcceptInviteRequest:
            properties:
                name:
                    type: string
                password:
                    type: string
                token:
                    type: string
            required:
                - token
                - name
                - password
            type: object
        AgentStat:
            properties:
                agent_id:
                    type: string
                avg_resolution_seconds:
                    type: number
                conversations:
                    type: integer
            type: object
        ApplyTagsRequest:
            properties:
                add:
                    description: Tag IDs (never names). On write you may send a tag ID or a tag name; the server resolves names to canonical IDs, so values are always stored and returned as IDs.
                    items:
                        type: string
                    type: array
                remove:
                    description: Tag IDs (never names). On write you may send a tag ID or a tag name; the server resolves names to canonical IDs, so values are always stored and returned as IDs.
                    items:
                        type: string
                    type: array
            type: object
        AssignRequest:
            properties:
                agent_id:
                    type: string
            type: object
        AssignableAgent:
            properties:
                avatar_url:
                    description: 'Read-only, derived: the agent''s short-lived signed avatar URL (loadable in <img src>, no Authorization). Empty when the agent has no ready avatar.'
                    type: string
                current_load:
                    type: integer
                id:
                    type: string
                max_concurrent_chats:
                    type: integer
                name:
                    type: string
                status:
                    type: string
            type: object
        Attachment:
            properties:
                content_type:
                    type: string
                filename:
                    type: string
                id:
                    type: string
                size:
                    type: integer
                url:
                    type: string
            type: object
        AttachmentRecord:
            properties:
                content_type:
                    type: string
                conversation_id:
                    type: string
                created_at:
                    format: date-time
                    type: string
                download_url:
                    type: string
                filename:
                    type: string
                id:
                    type: string
                message_id:
                    type: string
                size:
                    type: integer
                status:
                    type: string
                storage_provider:
                    type: string
            type: object
        AuditLog:
            properties:
                action:
                    type: string
                actor_id:
                    type: string
                actor_type:
                    type: string
                created_at:
                    format: date-time
                    type: string
                data:
                    additionalProperties: true
                    type: object
                id:
                    type: string
                ip:
                    type: string
                resource_id:
                    type: string
                resource_type:
                    type: string
                user_agent:
                    type: string
            type: object
        AutomationIntegration:
            properties:
                auth_type:
                    type: string
                base_url:
                    type: string
                created_at:
                    format: date-time
                    type: string
                enabled:
                    type: boolean
                has_secret:
                    type: boolean
                id:
                    type: string
                name:
                    type: string
                tenant_id:
                    type: string
                timeout_ms:
                    type: integer
                updated_at:
                    format: date-time
                    type: string
            type: object
        AutomationRun:
            properties:
                conversation_id:
                    type: string
                created_at:
                    format: date-time
                    type: string
                error:
                    type: string
                external_run_id:
                    type: string
                id:
                    type: string
                input:
                    additionalProperties: true
                    type: object
                message_id:
                    type: string
                output:
                    additionalProperties: true
                    type: object
                status:
                    type: string
                tenant_id:
                    type: string
                updated_at:
                    format: date-time
                    type: string
            type: object
        AvatarUploadTarget:
            properties:
                owner_id:
                    type: string
                owner_type:
                    enum:
                        - contacts
                        - users
                    type: string
            required:
                - owner_type
                - owner_id
            type: object
        Bucket:
            properties:
                count:
                    type: integer
                key:
                    type: string
            type: object
        BusinessStatus:
            properties:
                next_change_at:
                    format: date-time
                    type: string
                open:
                    type: boolean
                reason:
                    type: string
            type: object
        CSATResponse:
            properties:
                agent_id:
                    type: string
                comment:
                    type: string
                contact_id:
                    type: string
                conversation_id:
                    type: string
                created_at:
                    format: date-time
                    type: string
                id:
                    type: string
                responded_at:
                    format: date-time
                    type: string
                score:
                    type: integer
                sent_at:
                    format: date-time
                    type: string
                status:
                    type: string
                survey_id:
                    type: string
            type: object
        CannedResponse:
            properties:
                body:
                    type: string
                created_at:
                    format: date-time
                    type: string
                enabled:
                    type: boolean
                global:
                    type: boolean
                id:
                    type: string
                sector_ids:
                    items:
                        type: string
                    type: array
                shortcut:
                    type: string
                tenant_id:
                    type: string
                title:
                    type: string
                updated_at:
                    format: date-time
                    type: string
            type: object
        Chamado:
            properties:
                msg:
                    type: string
                protocolo:
                    type: string
            type: object
        ChamadoRequest:
            properties:
                id_cliente:
                    type: string
                isp_config_id:
                    type: string
                message:
                    type: string
                subject:
                    type: string
            required:
                - id_cliente
            type: object
        ChangePasswordRequest:
            properties:
                current_password:
                    type: string
                new_password:
                    type: string
            required:
                - current_password
                - new_password
            type: object
        Channel:
            properties:
                auth_type:
                    type: string
                automation_enabled:
                    type: boolean
                base_url:
                    type: string
                created_at:
                    format: date-time
                    type: string
                default_sector_id:
                    type: string
                enabled:
                    type: boolean
                has_inbound_token:
                    type: boolean
                has_secret:
                    type: boolean
                id:
                    type: string
                name:
                    type: string
                status:
                    type: string
                tenant_id:
                    type: string
                type:
                    type: string
                updated_at:
                    format: date-time
                    type: string
            type: object
        ChannelCreated:
            properties:
                auth_type:
                    type: string
                automation_enabled:
                    type: boolean
                base_url:
                    type: string
                created_at:
                    format: date-time
                    type: string
                default_sector_id:
                    type: string
                enabled:
                    type: boolean
                has_inbound_token:
                    type: boolean
                has_secret:
                    type: boolean
                id:
                    type: string
                inbound_token:
                    type: string
                name:
                    type: string
                outbound_secret:
                    type: string
                status:
                    type: string
                tenant_id:
                    type: string
                type:
                    type: string
                updated_at:
                    format: date-time
                    type: string
            type: object
        ChannelOutboundMessage:
            properties:
                contact:
                    properties:
                        external_id:
                            type: string
                        id:
                            type: string
                        name:
                            type: string
                        phone:
                            type: string
                    type: object
                conversation_id:
                    type: string
                delivery_id:
                    type: string
                message:
                    properties:
                        attachments:
                            items:
                                properties:
                                    content_type:
                                        type: string
                                    data_url:
                                        type: string
                                    file_type:
                                        enum:
                                            - image
                                            - audio
                                            - video
                                            - file
                                        type: string
                                    filename:
                                        type: string
                                    size:
                                        type: integer
                                    url:
                                        type: string
                                type: object
                            type: array
                        content:
                            type: string
                        file_type:
                            type: string
                        message_type:
                            type: string
                        private:
                            type: boolean
                        text:
                            type: string
                    type: object
                metadata:
                    additionalProperties: true
                    type: object
                timestamp:
                    type: integer
            type: object
        ClassifyRequest:
            properties:
                categories:
                    items:
                        type: string
                    type: array
                conversation_id:
                    type: string
            required:
                - conversation_id
                - categories
            type: object
        Cliente:
            properties:
                contrato_status_display:
                    type: string
                cpfcnpj:
                    type: string
                faturas:
                    items:
                        $ref: '#/components/schemas/Fatura'
                    type: array
                nome:
                    type: string
                valor_check_out:
                    type: number
            type: object
        ClienteFound:
            properties:
                cliente:
                    $ref: '#/components/schemas/Cliente'
                needs_selection:
                    const: false
                    type: boolean
            required:
                - needs_selection
                - cliente
            type: object
        ClienteNeedsSelection:
            properties:
                needs_selection:
                    const: true
                    type: boolean
                options:
                    items:
                        $ref: '#/components/schemas/ContratoOption'
                    type: array
            required:
                - needs_selection
                - options
            type: object
        ClienteRequest:
            properties:
                cpfcnpj:
                    type: string
                email:
                    type: string
                id_cliente:
                    description: Target a specific contract after a needs_input selection.
                    type: string
                isp_config_id:
                    description: ISP profile id to use; omit to use the tenant default. If there is no default and 2+ profiles, the response is a NeedsISPSelection prompt.
                    type: string
                phone:
                    type: string
            type: object
        ClienteResult:
            description: When needs_selection is true, render a contract selector from options[].id_cliente; otherwise use cliente.
            oneOf:
                - $ref: '#/components/schemas/ClienteFound'
                - $ref: '#/components/schemas/ClienteNeedsSelection'
        CloseReason:
            properties:
                created_at:
                    format: date-time
                    type: string
                enabled:
                    type: boolean
                id:
                    type: string
                name:
                    type: string
                requires_note:
                    type: boolean
                tenant_id:
                    type: string
                updated_at:
                    format: date-time
                    type: string
            type: object
        CloseRequest:
            properties:
                close_reason_id:
                    type: string
                note:
                    type: string
            type: object
        ConfirmAttachmentRequest:
            properties:
                attachment_id:
                    type: string
                message_id:
                    type: string
            required:
                - attachment_id
            type: object
        Contact:
            properties:
                avatar_attachment_id:
                    description: Attachment id of the contact's avatar (write it via PATCH).
                    type: string
                avatar_url:
                    description: 'Read-only, derived: a short-lived signed URL loadable directly in <img src> (no Authorization). Present only when the avatar exists and is ready. Do not cache long-term.'
                    type: string
                created_at:
                    format: date-time
                    type: string
                document:
                    type: string
                email:
                    type: string
                external_ids:
                    items:
                        $ref: '#/components/schemas/ContactExternalID'
                    type: array
                id:
                    type: string
                name:
                    type: string
                notes:
                    type: string
                phones:
                    items:
                        type: string
                    type: array
                tags:
                    description: Tag IDs (never names). On write you may send a tag ID or a tag name; the server resolves names to canonical IDs, so values are always stored and returned as IDs.
                    items:
                        type: string
                    type: array
                tenant_id:
                    type: string
                updated_at:
                    format: date-time
                    type: string
            type: object
        ContactExternalID:
            properties:
                channel:
                    enum:
                        - whatsapp
                        - telegram
                        - instagram
                        - webchat
                        - sms
                        - email
                        - api
                        - crm
                        - custom
                    type: string
                external_id:
                    type: string
            type: object
        ContactHit:
            properties:
                document:
                    type: string
                id:
                    type: string
                name:
                    type: string
                phone:
                    type: string
            type: object
        ContratoOption:
            properties:
                endereco:
                    type: string
                id_cliente:
                    type: string
                label:
                    type: string
                status:
                    type: string
            required:
                - id_cliente
                - label
            type: object
        Conversation:
            properties:
                agent_avatar_url:
                    description: 'Read-only, derived: the assignee''s short-lived signed avatar URL (no Authorization), resolved in batch. Empty when unassigned or no ready avatar.'
                    type: string
                agent_name:
                    description: 'Read-only, derived: the assignee''s display name, resolved in batch. Empty when the conversation is unassigned.'
                    type: string
                assigned_to:
                    type: string
                channel:
                    type: string
                closed_at:
                    format: date-time
                    type: string
                contact_avatar_url:
                    description: 'Read-only, derived: the conversation contact''s short-lived signed avatar URL (loadable in <img src>, no Authorization), resolved in batch for the inbox. Empty when the contact has no ready avatar.'
                    type: string
                contact_id:
                    type: string
                contact_name:
                    description: 'Read-only, derived: the conversation contact''s display name, resolved in batch so the inbox renders the row without a per-contact fetch. Empty when the contact is absent.'
                    type: string
                created_at:
                    format: date-time
                    type: string
                id:
                    type: string
                last_message:
                    $ref: '#/components/schemas/LastMessage'
                last_message_at:
                    format: date-time
                    type: string
                last_read_at:
                    format: date-time
                    type: string
                priority:
                    type: string
                queue_id:
                    type: string
                sector_id:
                    type: string
                status:
                    enum:
                        - new
                        - automation
                        - queued
                        - assigned
                        - waiting_customer
                        - waiting_agent
                        - transferred
                        - resolved
                        - closed
                        - archived
                    type: string
                tags:
                    description: Tag IDs (never names). On write you may send a tag ID or a tag name; the server resolves names to canonical IDs, so values are always stored and returned as IDs.
                    items:
                        type: string
                    type: array
                tenant_id:
                    type: string
                unread_count:
                    type: integer
                updated_at:
                    format: date-time
                    type: string
            type: object
        ConversationEvent:
            properties:
                actor_id:
                    type: string
                actor_type:
                    enum:
                        - agent
                        - customer
                        - system
                        - automation
                        - copilot
                    type: string
                conversation_id:
                    type: string
                created_at:
                    format: date-time
                    type: string
                data:
                    additionalProperties: true
                    type: object
                id:
                    type: string
                type:
                    type: string
            type: object
        ConversationHit:
            properties:
                assigned_to:
                    type: string
                channel:
                    type: string
                contact_id:
                    type: string
                id:
                    type: string
                last_message_at:
                    format: date-time
                    type: string
                priority:
                    type: string
                sector_id:
                    type: string
                status:
                    type: string
                tags:
                    description: Tag IDs (never names). On write you may send a tag ID or a tag name; the server resolves names to canonical IDs, so values are always stored and returned as IDs.
                    items:
                        type: string
                    type: array
                updated_at:
                    format: date-time
                    type: string
            type: object
        CopilotAssistant:
            properties:
                channel_types:
                    description: Conversation channel types this assistant serves (e.g. whatsapp).
                    items:
                        type: string
                    type: array
                created_at:
                    format: date-time
                    type: string
                enabled:
                    type: boolean
                id:
                    type: string
                isp_profile_id:
                    description: Pinned providerhub ISP profile id, or empty for no ISP tools.
                    type: string
                name:
                    type: string
                tenant_id:
                    type: string
                updated_at:
                    format: date-time
                    type: string
            type: object
        CopilotConfig:
            properties:
                allow_customer_data:
                    type: boolean
                allow_financial_data:
                    type: boolean
                allow_monitoring_data:
                    type: boolean
                base_url:
                    type: string
                created_at:
                    format: date-time
                    type: string
                enabled:
                    type: boolean
                has_key:
                    type: boolean
                human_approval_required:
                    type: boolean
                id:
                    type: string
                max_tokens:
                    type: integer
                model:
                    type: string
                provider:
                    type: string
                temperature:
                    type: number
                tenant_id:
                    type: string
                updated_at:
                    format: date-time
                    type: string
            type: object
        CopilotResult:
            properties:
                action:
                    enum:
                        - suggest_reply
                        - summarize
                        - classify
                        - next_action
                    type: string
                categories:
                    items:
                        type: string
                    type: array
                estimated_cost:
                    type: number
                model:
                    type: string
                proposed_actions:
                    items:
                        $ref: '#/components/schemas/ProposedAction'
                    type: array
                provider:
                    type: string
                requires_approval:
                    type: boolean
                text:
                    type: string
                tokens_input:
                    type: integer
                tokens_output:
                    type: integer
            type: object
        CreateAutomationRequest:
            properties:
                auth_type:
                    type: string
                base_url:
                    type: string
                name:
                    type: string
                secret:
                    type: string
                timeout_ms:
                    type: integer
            required:
                - base_url
            type: object
        CreateCannedRequest:
            properties:
                body:
                    type: string
                enabled:
                    type: boolean
                sector_ids:
                    items:
                        type: string
                    type: array
                shortcut:
                    type: string
                title:
                    type: string
            required:
                - shortcut
                - body
            type: object
        CreateChannelRequest:
            properties:
                auth_type:
                    type: string
                automation_enabled:
                    type: boolean
                base_url:
                    type: string
                default_sector_id:
                    type: string
                name:
                    type: string
                outbound_secret:
                    type: string
                outbound_url:
                    type: string
                secret:
                    type: string
                type:
                    type: string
            required:
                - type
            type: object
        CreateCloseReasonRequest:
            properties:
                enabled:
                    type: boolean
                name:
                    type: string
                requires_note:
                    type: boolean
            required:
                - name
            type: object
        CreateContactRequest:
            properties:
                avatar_attachment_id:
                    description: Attachment id (image, status=ready, same tenant) to use as avatar; uploaded via the avatar upload-url flow. Invalid -> 400 validation_error.
                    type: string
                document:
                    description: CPF (11 digits) or CNPJ (14 digits); validated by check digits and stored digits-only (no mask).
                    type: string
                email:
                    description: Email address; format-validated and stored lowercased.
                    type: string
                external_ids:
                    items:
                        $ref: '#/components/schemas/ContactExternalID'
                    type: array
                name:
                    type: string
                notes:
                    type: string
                phones:
                    items:
                        description: Phone number; normalized to E.164 on write (default region BR). Invalid numbers are rejected with 400 validation_error.
                        type: string
                    type: array
                tags:
                    description: Tag IDs (never names). On write you may send a tag ID or a tag name; the server resolves names to canonical IDs, so values are always stored and returned as IDs.
                    items:
                        type: string
                    type: array
            required:
                - name
            type: object
        CreateConversationRequest:
            properties:
                assigned_to:
                    type: string
                channel:
                    type: string
                contact_id:
                    type: string
                priority:
                    type: string
                queue_id:
                    type: string
                sector_id:
                    type: string
                tags:
                    description: Tag IDs (never names). On write you may send a tag ID or a tag name; the server resolves names to canonical IDs, so values are always stored and returned as IDs.
                    items:
                        type: string
                    type: array
            required:
                - contact_id
                - channel
            type: object
        CreateCopilotAssistantRequest:
            properties:
                channel_types:
                    items:
                        type: string
                    type: array
                enabled:
                    description: Defaults to true when omitted.
                    type: boolean
                isp_profile_id:
                    description: Optional providerhub ISP profile id to pin; must exist.
                    type: string
                name:
                    type: string
            required:
                - name
            type: object
        CreateHolidayRequest:
            properties:
                date:
                    type: string
                name:
                    type: string
                recurring:
                    type: boolean
                sector_ids:
                    items:
                        type: string
                    type: array
            required:
                - date
                - name
            type: object
        CreateISPProfileRequest:
            properties:
                credentials:
                    additionalProperties:
                        type: string
                    description: ISP credentials; keys must match the catalog for isp_type 1:1 (GET /v1/providerhub/catalog). Values are write-only and never returned.
                    type: object
                enabled:
                    description: Defaults to true when omitted.
                    type: boolean
                is_default:
                    description: Make this the default profile. The first profile of a tenant is always the default.
                    type: boolean
                isp_type:
                    description: ISP slug (config.type). One of the 19 catalog slugs from GET /v1/providerhub/catalog (legacy voalle/sgp also accepted).
                    enum:
                        - altarede
                        - beesweb
                        - hubsoft
                        - ispcloud
                        - ispcontrollr
                        - ispfy
                        - ixcsoft
                        - mikweb
                        - mkauth
                        - mksolutions
                        - netcontrol
                        - radiusnet
                        - rbfull
                        - rbxsoft
                        - receitanet
                        - sgmcloud
                        - sgpnet
                        - topsapp
                        - whmcs
                        - voalle
                        - sgp
                    type: string
                label:
                    description: Required. Human label distinguishing profiles.
                    type: string
                timeout_ms:
                    type: integer
                usa_extrair_linha_digitavel_pdf:
                    type: boolean
                usa_pegar_fatura_atrasada:
                    type: boolean
            required:
                - label
                - isp_type
            type: object
        CreateMcpServerRequest:
            properties:
                auth_header:
                    type: string
                auth_token:
                    type: string
                base_url:
                    type: string
                kind:
                    enum:
                        - read
                        - write
                    type: string
                name:
                    type: string
            required:
                - name
                - base_url
                - kind
            type: object
        CreateQueueRequest:
            properties:
                enabled:
                    type: boolean
                max_wait_seconds:
                    type: integer
                name:
                    type: string
                sector_id:
                    type: string
                strategy:
                    type: string
            required:
                - sector_id
                - name
            type: object
        CreateRoleRequest:
            properties:
                name:
                    type: string
                permissions:
                    items:
                        type: string
                    type: array
                sector_scope:
                    enum:
                        - own
                        - all
                    type: string
            required:
                - name
            type: object
        CreateSLAPolicyRequest:
            properties:
                business_hours_only:
                    type: boolean
                channel:
                    type: string
                enabled:
                    type: boolean
                first_response_target_seconds:
                    type: integer
                name:
                    type: string
                pause_on_waiting_customer:
                    type: boolean
                priority:
                    type: string
                resolution_target_seconds:
                    type: integer
                sector_ids:
                    items:
                        type: string
                    type: array
                warning_threshold_percent:
                    type: integer
            required:
                - name
            type: object
        CreateSectorRequest:
            properties:
                business_hours:
                    additionalProperties: true
                    type: object
                description:
                    type: string
                enabled:
                    type: boolean
                name:
                    type: string
            required:
                - name
            type: object
        CreateSurveyRequest:
            properties:
                delay_seconds:
                    type: integer
                enabled:
