            properties:
                expires_at:
                    description: When the 24h window closes = last inbound customer message + 24h (ISO 8601). Absent when the customer has never messaged.
                    type: string
                open:
                    description: True when the customer messaged in the last 24h (free-form text/media is deliverable). False otherwise — only a template can be sent.
                    type: boolean
            required:
                - open
            type: object
    securitySchemes:
